version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: aipic-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-aipic}
      MYSQL_USER: ${DB_USER:-aipic}
      MYSQL_PASSWORD: ${DB_PASSWORD:-aipic}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - aipic-network

  app:
    build: .
    container_name: aipic-app
    restart: always
    environment:
      DATABASE_URL: mysql://${DB_USER:-aipic}:${DB_PASSWORD:-aipic}@mysql:3306/${DB_NAME:-aipic}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    volumes:
      - ./public/images:/app/public/images
    networks:
      - aipic-network

  nginx:
    image: nginx:latest
    container_name: aipic-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - aipic-network

volumes:
  mysql_data:

networks:
  aipic-network:
    driver: bridge
